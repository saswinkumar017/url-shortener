<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener - Simplify Your Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav">
        <div class="nav-inner">
            <span class="logo">🔗 UrlShortener</span>
            <div class="nav-links">
                <span class="nav-badge">Free</span>
                <span class="nav-badge">No Sign-up</span>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-badge">🌟 Simplify your links</div>
            <h1 class="hero-title">Shorten URLs.<br>Share instantly.</h1>
            <p class="hero-sub">Paste your long URL below and get a short, shareable link in seconds.</p>

            <div class="container">
                <div class="input-group">
                    <input type="text" id="url" placeholder="Enter your long URL here...">
                    <div class="btn-group">
                        <button onclick="shortenUrl()" id="shorten-btn">
                            <span>Shorten</span>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                        </button>
                        <button onclick="clearUrl()" id="clear-btn" title="Clear">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div id="result-card" class="hidden">
                <div class="result-header">
                    <span class="result-icon">✅</span>
                    <span class="result-label">Your shortened URL is ready!</span>
                </div>
                <div class="url-box">
                    <a id="short-url" target="_blank"></a>
                    <button id="copy-btn" title="Copy to clipboard">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        <span class="tooltip">Copied!</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- <section class="features">
            <div class="feature-card">
                <div class="feature-icon">⚡</div>
                <h3>Lightning Fast</h3>
                <p>Generate shortened URLs instantly with zero wait time.</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🔒</div>
                <h3>Reliable</h3>
                <p>Your links stay active and resolve every time.</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🌍</div>
                <h3>Unlimited</h3>
                <p>No limits, no accounts — shorten as many as you need.</p>
            </div>
        </section> -->
    </main>

   

    <script src="script.js"></script>
  
</body>
</html>
